!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MODIJIxDTU</title>
    <!-- Use basic, elegant styling as requested for a clean aesthetics -->
    <style>
body {
    margin: 0;
    padding: 0;
    height: 100vh;
    background-color: #1a1a2e;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    color: #ecf0f1;
    overflow: hidden;
    touch-action: none;
}

        /* Container scales based on JS window calculations */
        #game-container {
            position: relative;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.8);
            border-radius: 12px;
            overflow: hidden; /* Contains overflowing ui elements */
        }

        canvas {
            background: linear-gradient(180deg, #16213e 0%, #0f3460 100%);
            display: block;
        }

        /* Virtual UI layer overlays the entire game space container perfectly. */
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            z-index: 5;
        }

        .hidden {
            display: none !important;
        }

        .modal-screen {
            background: rgba(22, 33, 62, 0.85);
            padding: 25px;
            max-width: 85%;
            width: 320px;
            border-radius: 15px;
            backdrop-filter: blur(8px);
            pointer-events: auto; /* Let clicks register here */
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-sizing: border-box;
        }

        h1 { margin-top: 0; font-size: clamp(2rem, 8vw, 2.5rem); color: #4facfe; text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5); }
        h2 { margin-top: 0; font-size: clamp(1.8rem, 6vw, 2.2rem); color: #e94560; }
        p { margin: 12px 0; font-size: clamp(0.9rem, 3.5vw, 1.1rem); line-height: 1.5; }

        .highlight { color: #f9ca24; font-weight: bold; }
        .key-btn {
            background: rgba(255, 255, 255, 0.2);
            padding: 3px 8px;
            border-radius: 4px;
            font-family: monospace;
            border: 1px solid rgba(255, 255, 255, 0.4);
        }

        /* Core Action buttons (Start / Restart) */
        button.action-btn {
            width: 100%;
            padding: 15px 20px;
            font-size: clamp(1rem, 4vw, 1.2rem);
            font-weight: bold;
            color: white;
            background: linear-gradient(90deg, #4facfe 0%, #00f2fe 100%);
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-top: 20px;
            box-shadow: 0 4px 15px rgba(79, 172, 254, 0.4);
            user-select: none;
            touch-action: manipulation;
        }

        button.action-btn:hover { transform: scale(1.05) translateY(-2px); box-shadow: 0 6px 20px rgba(79, 172, 254, 0.6); }
        button.action-btn:active { transform: scale(0.98); }

        /* HUD Typography Elements */
        .hud-element {
            position: absolute;
            font-weight: bold;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.8);
            pointer-events: none;
            z-index: 2;
        }

        .score-display {
            top: 15px;
            left: 15px;
            font-size: clamp(1.8rem, 6vw, 2.2rem);
            color: white;
        }

        .mode-indicator {
            bottom: 20px;
            left: 15px;
            font-size: clamp(0.8rem, 3vw, 1.1rem);
            background: rgba(0, 0, 0, 0.5);
            padding: 5px 12px;
            border-radius: 20px;
        }

        /* --- Clickable Floating Overlay Actions --- */
        .overlay-act-btn {
            position: absolute;
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.4);
            border: 2px solid rgba(255, 255, 255, 0.2);
            color: white;
            border-radius: 50%;
            z-index: 10;
            backdrop-filter: blur(4px);
            cursor: pointer;
            user-select: none;
            -webkit-tap-highlight-color: transparent; /* Remove blue highlight on mobile */
            transition: transform 0.1s, border 0.2s, background 0.2s;
            pointer-events: auto;
        }

        .overlay-act-btn:active {
            transform: scale(0.9);
            border-color: #fff;
            background: rgba(255, 255, 255, 0.2);
        }

        /* Top Right controls (Pause & Fullscreen) */
        #top-controls {
            position: absolute;
            top: 15px;
            right: 15px;
            display: flex;
            gap: 10px;
            z-index: 10;
            pointer-events: none; /* Container clicks pass through, unless on buttons */
        }

        .icon-btn {
            position: relative; /* Break absolute from base class */
            width: 45px;
            height: 45px;
            font-size: 1.2rem;
            color: #ecf0f1;
        }

        /* Gravity Switcher - Bottom Corner */
        .gravity-btn {
            bottom: 20px;
            right: 15px;
            width: 65px;
            height: 65px;
            font-size: 1.8rem;
            font-weight: 900;
            color: #4facfe; /* Default anti-gravity blue */
            border-color: rgba(79, 172, 254, 0.4);
        }

    </style>
</head>

</body>

</html>
